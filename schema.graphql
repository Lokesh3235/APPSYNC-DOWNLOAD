schema {
  query: Query
  mutation: Mutation
}

type Mutation {
  addCreditsToUser(input: addCreditsToUserInput): AWSJSON
  bookMarkQuestions(input: bookMarkQuestionsInput): AWSJSON
  clearResponse(input: clearResponseInput): AWSJSON
  createQuizAttempts(input: createQuizAttemptsInput): AWSJSON
  endQuizAttempt(input: endQuizAttemptInput): AWSJSON
  generateS3UploadURL(input: commons3Input): AWSJSON
  recordUserActivity(input: recordUserActivityInput): AWSJSON
  submitQuizQuestionAnswer(input: submitQuizQuestionAnswerInput): AWSJSON
  #  GAMING PORTAL BASIC APIs
  switchToATeam(input: switchToATeamInput): AWSJSON
  updateProfile(input: updateProfileInput): AWSJSON
}

type Query {
  GetParticularQuestionDetailsOfAttempt(input: GetParticularQuestionDetailsOfAttemptInput): AWSJSON
  getAllTeamsOfUser: AWSJSON
  getAttemptDetails(input: getAttemptDetailsInput): AWSJSON
  #  GAMING PORTAL BASIC APIs
  getCurrentUserDetails: AWSJSON
  #  S3 UPLOAD APIs
  getDocumentPresignedURL(input: commons3Input): AWSJSON
  getQuestionDetails(input: getQuestionDetailsInput): AWSJSON
  listBmsSettings: AWSJSON
  listBookMarksOfUser(input: listBookMarksOfUserInput): AWSJSON
  listQuizAttemptQuestions(input: listQuizAttemptQuestionsInput): AWSJSON
  listQuizAttempts: AWSJSON
  listQuizQuestions(quiz_id: String): AWSJSON
  listQuizRunLeaderboard(input: listQuizRunLeaderboardInput): AWSJSON
  listQuizarreQuizRuns(input: listQuizarreQuizRunsInput): AWSJSON
  listTeamLeaderboard(input: listTeamLeaderboardInput): AWSJSON
}

enum attemptCurrentDirectionEnum {
  BACKWARD
  FORWARD
}

enum leaderboardTypeEnum {
  DAILY
  MONTHLY
  OVERALL
  YEARLY
}

enum quizRunStatusEnum {
  COMPLETED
  LIVE
  SCHEDULED
}

enum teamIsDefaultEnum {
  FALSE
  TRUE
}

input GetParticularQuestionDetailsOfAttemptInput {
  attempt_id: String!
  question_id: String!
  quiz_id: String!
}

input addCreditsToUserInput {
  amount: Float!
  credits_to_be_added: Float!
  user_id: String!
}

input bookMarkQuestionsInput {
  attempt_id: String!
  createBookMark: Boolean!
  question_id: String!
}

input clearResponseInput {
  attempt_id: String!
  question_id: String!
  quiz_id: String!
}

input commons3Input {
  key: String!
}

input createQuizAttemptsInput {
  quiz_run_id: String!
}

input createUserInput {
  user_email_id: String!
}

input endQuizAttemptInput {
  attempt_id: String!
}

input getAttemptDetailsInput {
  attempt_id: String!
}

input getQuestionDetailsInput {
  attempt_current_direction: attemptCurrentDirectionEnum!
  attempt_id: String!
}

input listBookMarksOfUserInput {
  attempt_id: String!
}

input listQuizAttemptQuestionsInput {
  attempt_id: String!
}

input listQuizRunLeaderboardInput {
  quiz_run_id: String!
}

input listQuizarreQuizRunsInput {
  next_token: String
  quiz_run_status: quizRunStatusEnum!
}

input listTeamLeaderboardInput {
  leaderboard_date: String!
  leaderboard_month: String!
  leaderboard_type: leaderboardTypeEnum
  leaderboard_year: String!
}

input recordUserActivityInput {
  browser_name: String
  device_type: String
  logout_time: Float
  user_location: String
}

input submitQuizQuestionAnswerInput {
  attempt_id: String!
  question_answer: String
  question_id: String!
}

input switchToATeamInput {
  team_code: String
  team_is_default: teamIsDefaultEnum!
}

input updateProfileInput {
  notification_enabled: Boolean
  profile_pic: String
  user_name: String
}
