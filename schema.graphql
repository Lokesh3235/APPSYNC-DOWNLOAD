schema {
  query: Query
  mutation: Mutation
}

type Mutation {
  createUser(input: createUserInput): AWSJSON
  createUser2(input: createUserInput): AWSJSON
}

type Query {
  listUsers(input: listUserInput): AWSJSON
  listUsers2(input: listUserInput): AWSJSON
}

input createUserInput {
  user_name: String
}

input listUserInput {
  user_status: String
}
